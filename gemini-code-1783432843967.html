    // SUB-COMPONENT: 3D CAD/CAM WIREFRAME CANVAS
    // ============================================================================
    const CAD3DViewer = ({ project }) => {
      const canvasRef = useRef(null);
      const isDragging = useRef(false);
      const previousMousePosition = useRef({ x: 0, y: 0 });
      const rotation = useRef({ x: 0.5, y: 0.6 }); 
      const toolpathPos = useRef(0);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationId;

        const resizeCanvas = () => {
          canvas.width = canvas.parentElement.clientWidth;
          canvas.height = canvas.parentElement.clientHeight - 40;
        };
        resizeCanvas();

        const drawGridBg = () => {
          ctx.strokeStyle = 'rgba(6, 182, 212, 0.05)';
          ctx.lineWidth = 1;
          const spacing = 20;
          for (let x = 0; x < canvas.width; x += spacing) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
          }
          for (let y = 0; y < canvas.height; y += spacing) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
          }
        };

        const render = () => {
          if (!ctx || !canvas) return;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          drawGridBg();

          if (!isDragging.current) {
            rotation.current.y += 0.004;
          }

          const cx = canvas.width / 2;
          const cy = canvas.height / 2;
          const focalLength = 320;

          const cosX = Math.cos(rotation.current.x);
          const sinX = Math.sin(rotation.current.x);
          const cosY = Math.cos(rotation.current.y);
          const sinY = Math.sin(rotation.current.y);

          const projected = project.vertices.map(v => {
            const x = v[0]; const y = v[1]; const z = v[2];
            const y1 = y * cosX - z * sinX;
            const z1 = y * sinX + z * cosX;
            const x2 = x * cosY + z1 * sinY;
            const z2 = -x * sinY + z1 * cosY;

            const scale = focalLength / (focalLength + z2 + 90);
            return { x: cx + x2 * scale * 2.8, y: cy + y1 * scale * 2.8, z: z2 };
          });

          ctx.strokeStyle = 'rgba(6, 182, 212, 0.75)';
          ctx.lineWidth = 2;
          project.edges.forEach(edge => {
            const p1 = projected[edge[0]];
            const p2 = projected[edge[1]];
            if (p1 && p2) {
              ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }
          });

          ctx.fillStyle = '#06b6d4';
          projected.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
          });

          if (projected.length > 1) {
            toolpathPos.current = (toolpathPos.current + 0.005) % 1;
            const totalEdges = project.edges.length;
            const activeEdgeIndex = Math.floor(toolpathPos.current * totalEdges);
            const activeEdge = project.edges[activeEdgeIndex];
            
            if (activeEdge) {
              const p1 = projected[activeEdge[0]];
              const p2 = projected[activeEdge[1]];
              const edgeProgress = (toolpathPos.current * totalEdges) % 1;
              const toolX = p1.x + (p2.x - p1.x) * edgeProgress;
              const toolY = p1.y + (p2.y - p1.y) * edgeProgress;

              ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
              ctx.lineWidth = 2;
              ctx.beginPath(); ctx.arc(toolX, toolY, 7, 0, Math.PI * 2); ctx.stroke();

              ctx.fillStyle = '#22d3ee';
              ctx.beginPath(); ctx.arc(toolX, toolY, 3, 0, Math.PI * 2); ctx.fill();
            }
          }

          animationId = requestAnimationFrame(render);
        };
        render();

        const handleMouseDown = (e) => {
          isDragging.current = true;
          previousMousePosition.current = { x: e.clientX, y: e.clientY };
        };
        const handleMouseMove = (e) => {
          if (!isDragging.current) return;
          const deltaX = e.clientX - previousMousePosition.current.x;
          const deltaY = e.clientY - previousMousePosition.current.y;
          rotation.current.y += deltaX * 0.008;
          rotation.current.x += deltaY * 0.008;
          previousMousePosition.current = { x: e.clientX, y: e.clientY };
        };
        const handleMouseUp = () => { isDragging.current = false; };

        canvas.addEventListener('mousedown', handleMouseDown);
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);
        window.addEventListener('resize', resizeCanvas);

        return () => {
          cancelAnimationFrame(animationId);
          canvas.removeEventListener('mousedown', handleMouseDown);
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseup', handleMouseUp);
          window.removeEventListener('resize', resizeCanvas);
        };
      }, [project]);

      const applyPreset = (preset) => {
        if (preset === 'top') rotation.current = { x: Math.PI / 2, y: 0 };
        else if (preset === 'front') rotation.current = { x: 0, y: 0 };
        else if (preset === 'isometric') rotation.current = { x: 0.5, y: 0.6 };
        else if (preset === 'side') rotation.current = { x: 0, y: Math.PI / 2 };
      };

      return (
        <div className="w-full h-full flex flex-col relative">
          <div className="absolute top-12 right-3 z-30 flex flex-col gap-1.5 bg-[#07090d]/90 border border-zinc-800 p-1.5 font-mono text-[9px] font-bold">
            <button onClick={() => applyPreset('isometric')} className="px-2 py-1 bg-zinc-800 text-cyan-400 hover:text-white transition-all">ISO</button>
            <button onClick={() => applyPreset('top')} className="px-2 py-1 bg-zinc-800 text-zinc-400 hover:text-white transition-all">TOP</button>
            <button onClick={() => applyPreset('front')} className="px-2 py-1 bg-zinc-800 text-zinc-400 hover:text-white transition-all">FRONT</button>
            <button onClick={() => applyPreset('side')} className="px-2 py-1 bg-zinc-800 text-zinc-400 hover:text-white transition-all">SIDE</button>
          </div>
          <canvas ref={canvasRef} className="w-full flex-grow cursor-grab active:cursor-grabbing block" />
        </div>
      );
    };

    // ============================================================================
    // SUB-COMPONENT: STAMPING PRESS SIMULATION
    // ============================================================================
    const StampingSimulationWidget = ({ pushLog }) => {

                  <line x1="190" y1="95" x2="210" y2="80" stroke="#06b6d4" strokeWidth="2" />

            </svg>
          </div>
          <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-[#07090d] p-4 border border-zinc-800">
            <div className="font-mono text-xs text-zinc-300 font-bold">
              <span>UPPER PUNCH GUIDE CLEARANCE:</span>
              <div className="flex items-center gap-3 mt-1.5">
                <input type="range" min="0.01" max="0.10" step="0.01" value={guideClearance} onChange={(e) => setGuideClearance(Number(e.target.value))} className="accent-cyan-400 h-1 cursor-ew-resize" />
                <span className="text-cyan-400">{guideClearance.toFixed(2)} mm</span>
              </div>
            </div>
            <button onClick={startStampSequence} disabled={stampProgress !== 0} className="px-6 py-2 bg-cyan-500 text-black font-mono text-xs font-black uppercase">STAMP CYCLE</button>
          </div>
        </div>
      );
    };

    // ============================================================================

              <div className="flex justify-between py-2 bg-black px-2 border-l-2 border-cyan-400"><span>PRESS TONNAGE:</span><span className="text-cyan-400 font-bold">{calculatedForceTons.toFixed(2)} TONS</span></div>
              <div className="flex justify-between"><span>RECOMMENDED CLEARANCE:</span><span className="text-white font-bold">{recommendedClearance.toFixed(3)} mm</span></div>
            </div>

                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* TAB: 10 BLUEPRINT PROJECTS */}
            {activeTab === 'blueprints' && (
              <div className="bg-[#07090d] border-2 border-zinc-800 p-6 sm:p-8">
                <div className="mb-6 pb-6 border-b border-zinc-800">
                  <span className="font-mono text-xs text-cyan-400 block font-black uppercase">// SOLIDWORKS & POWERMILL LEDGER</span>
                  <h3 className="text-xl sm:text-2xl font-black text-white uppercase font-mono mt-1">Mechanical Case Studies & Wireframes</h3>
                  <p className="text-xs text-zinc-400">Click and drag inside the viewport box to dynamically orbit or rotate the active wireframe model.</p>
                </div>

                <div className="grid grid-cols-1 xl:grid-cols-12 gap-8 items-stretch">
                  <div className="xl:col-span-4 space-y-2 max-h-[580px] overflow-y-auto pr-2">
                    {USER_PROFILE.projects.map(proj => (
                      <button
                        key={proj.id}
                        onClick={() => { setSelectedProject(proj); pushLog(`VIEWED CAD MODEL: ${proj.id}`); }}
                        className={`w-full text-left p-4 border transition-all flex justify-between items-center ${
                          selectedProject.id === proj.id ? 'bg-zinc-900 border-cyan-400 text-white' : 'bg-[#030406] border-zinc-900 text-zinc-500 hover:text-white'
                        }`}
                      >
                        <div className="space-y-1">
                          <div className="flex items-center gap-2">
                            <span className="text-[9px] font-mono px-1.5 py-0.5 bg-zinc-800 border border-zinc-700 text-zinc-400">{proj.id}</span>
                            <span className="text-xs sm:text-sm font-mono font-bold uppercase">{proj.title}</span>
                          </div>
                          <span className="block text-[9px] font-mono text-zinc-500">{proj.tagline}</span>
                        </div>
                      </button>
                    ))}
                  </div>

                  <div className="xl:col-span-8 bg-[#030406] border border-zinc-800 p-6 flex flex-col justify-between">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                      <div className="space-y-4">
                        <span className="text-[10px] font-mono text-cyan-400 bg-cyan-950 px-2 py-0.5 border border-cyan-500/20 font-bold uppercase">CAD DATA CARD</span>
                        <h4 className="text-base sm:text-lg font-black text-white uppercase">{selectedProject.title}</h4>
                        <p className="text-xs text-zinc-400 leading-relaxed">{selectedProject.description}</p>
                        
                        <div className="space-y-1.5">
                          <span className="text-[9px] font-mono text-zinc-500 block uppercase">CNC Toolpath G-Code Output</span>
                          <pre className="bg-black border border-zinc-900 p-3 text-[10px] text-cyan-400 h-28 overflow-y-auto font-mono whitespace-pre">
                            {selectedProject.gcode}
                          </pre>
                        </div>
                      </div>

                      <div className="bg-black border border-zinc-900 h-72 relative">
                        <CAD3DViewer project={selectedProject} />
                      </div>
                    </div>

                    <div className="border-t border-zinc-850 pt-4 mt-6 flex justify-between items-center font-mono text-xs">
                      <span className="text-zinc-500">SOURCE: Ahmed Kamel Engineering Portfolio</span>
                      <button 
                        onClick={() => {
                          navigator.clipboard.writeText(selectedProject.gcode);
                          pushLog("G-CODE COPIED."); triggerToast("NC Code copied.");
                        }}
                        className="px-4 py-2 bg-zinc-800 text-cyan-400 font-bold border border-cyan-500/10 uppercase"
                      >
                        Copy G-Code Block
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: CAREER & TRAINING */}
            {activeTab === 'career' && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div className="bg-[#07090d] border border-zinc-800 p-6 space-y-6">
                  <h3 className="text-sm font-mono text-cyan-400 font-black border-b border-zinc-800 pb-3">FORMAL EDUCATION ACADEMICS</h3>
                  <div className="space-y-6">
                    {USER_PROFILE.education.map((edu, idx) => (
                      <div key={idx} className="bg-black border border-zinc-900 p-5 space-y-3">
                        <div className="flex justify-between items-start flex-wrap gap-2">
                          <h4 className="text-sm font-mono font-black text-white uppercase">{edu.institution}</h4>
                          <span className="text-[9px] font-mono bg-zinc-800 text-cyan-400 px-2 py-0.5 border border-cyan-500/10">{edu.period}</span>
                        </div>
                        <p className="text-xs font-mono text-zinc-400 uppercase">{edu.degree}</p>
                        <p className="text-xs text-zinc-500 leading-relaxed">{edu.details}</p>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-[#07090d] border border-zinc-800 p-6 space-y-6">
                  <h3 className="text-sm font-mono text-cyan-400 font-black border-b border-zinc-800 pb-3">PRACTICAL INDUSTRIAL TRAINING</h3>
                  <div className="space-y-6">
                    {USER_PROFILE.training.map((trn, idx) => (
                      <div key={idx} className="bg-black border border-zinc-900 p-5 space-y-3">
                        <div className="flex justify-between items-start flex-wrap gap-2">
                          <h4 className="text-sm font-mono font-black text-white uppercase">{trn.company}</h4>
                          <span className="text-[9px] font-mono text-zinc-400">{trn.period}</span>
                        </div>
                        <p className="text-xs font-mono text-cyan-400 uppercase">// {trn.role}</p>
                        <ul className="text-xs text-zinc-400 list-disc pl-4 space-y-1.5 font-mono">
                          {trn.points.map((p, i) => <li key={i}>{p}</li>)}
                        </ul>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* TAB: SECURE DISPATCH */}
            {activeTab === 'contact' && (
              <div className="bg-[#07090d] border border-zinc-800 p-8 max-w-4xl mx-auto space-y-6">
                <div>
                  <span className="font-mono text-xs text-cyan-400 block font-black">// SECURE COMMUNICATOR</span>
                  <h3 className="text-lg font-mono font-black text-white mt-1">Transmit Technical Request</h3>
                  <p className="text-xs text-zinc-400 mt-2">Required tolerances, tooling designs, CAD drafting variables or manufacturing tasks? Send direct messages directly to Ahmed's terminal mailbox.</p>
                </div>
                
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-[#030406] p-4 border border-zinc-900 font-mono text-xs text-zinc-300">
                  <div><span>Email:</span> <a href={`mailto:${USER_PROFILE.email}`} className="text-cyan-400 hover:underline">{USER_PROFILE.email}</a></div>
                  <div><span>Phone Support:</span> <a href="tel:+201158647813" className="text-white hover:underline">{USER_PROFILE.phone}</a></div>
                </div>

                <div className="space-y-4">
                  <input id="clName" type="text" placeholder="Full Client Identity / Organization Name" className="w-full bg-[#030406] border border-zinc-800 p-3 text-xs text-white outline-none focus:border-cyan-400 font-mono" />
                  <textarea id="clMsg" rows={4} placeholder="Input mechanical parameters, stock thicknesses or design challenges..." className="w-full bg-[#030406] border border-zinc-800 p-3 text-xs text-white outline-none focus:border-cyan-400 font-mono" />
                  
                  <button 
                    onClick={() => {
                      const name = document.getElementById("clName").value;
                      const msg = document.getElementById("clMsg").value;
                      if (!name || !msg) return;
                      window.location.href = `mailto:${USER_PROFILE.email}?subject=Mechanical Project Inquiry&body=Name: ${name}%0D%0A%0D%0AProject Scope: %0D%0A${msg}`;
                      pushLog("TRANSMISSION PROTOCOL FIRED."); triggerToast("Email dispatcher opened.");
                    }}
                    className="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black font-mono text-xs py-3 uppercase tracking-widest"
                  >
                    DISPATCH SIGNAL MAIL
                  </button>
                </div>
              </div>
            )}

          </main>

          {/* Core Footer Element */}
          <footer className="border-t border-zinc-900 bg-black py-10 px-4 mt-20 font-mono text-[10px] text-zinc-500 text-center space-y-2">
            <span className="block font-black text-white text-xs sm:text-sm uppercase tracking-wider">{USER_PROFILE.name}</span>
            <span>Production Technology Specialist • Minya El-Qamh, Sharqia, Egypt</span>
          </footer>

        </div>
      );
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
